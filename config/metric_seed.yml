  - { key: overall_roi, field: 整体支付ROI, category: ROI, unit: ratio, precision: 2, scope: cumulative, aggregation: LAST, direction: higher_better }
  - { key: overall_amount, field: 整体成交金额（元）, category: 金额, unit: currency, precision: 2, scope: cumulative, aggregation: LAST_PER_ROOM_DAY, direction: higher_better }
