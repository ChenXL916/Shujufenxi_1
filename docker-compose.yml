x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: live_ops
      POSTGRES_USER: live_ops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U live_ops -d live_ops"]
      interval: 5s
      timeout: 5s
      retries: 12
    stop_grace_period: 30s
    logging: *default-logging

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    stop_grace_period: 30s
    logging: *default-logging

  api:
    image: live-ops-api:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    init: true
    command:
      - sh
      - -c
      - alembic upgrade head && python scripts/seed_demo.py && python scripts/import_excel_fixture.py && uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"]
      interval: 10s
      timeout: 5s
      retries: 12
    stop_grace_period: 30s
    logging: *default-logging

  celery-worker:
    image: live-ops-api:${IMAGE_TAG:-local}
    restart: unless-stopped
    init: true
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=INFO"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    stop_grace_period: 60s
    logging: *default-logging

  celery-beat:
    image: live-ops-api:${IMAGE_TAG:-local}
    restart: unless-stopped
    init: true
    command: ["celery", "-A", "app.tasks.celery_app", "beat", "--loglevel=INFO"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    stop_grace_period: 30s
    logging: *default-logging

  web:
    image: live-ops-web:${IMAGE_TAG:-local}
    build: ./apps/web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/web-health"]
      interval: 10s
      timeout: 5s
      retries: 12
    logging: *default-logging

  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
