upstream api {
  server api:8000;
  keepalive 16;
}

upstream web {
  server web:8080;
  keepalive 8;
}

server {
  listen 8080;
  server_name _;
  return 308 https://$host$request_uri;
}

server {
  listen 8443 ssl;
  server_name _;
  server_tokens off;
  client_max_body_size 10m;

  ssl_certificate /etc/nginx/tls/server.crt;
  ssl_certificate_key /etc/nginx/tls/server.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:LiveOpsTLS:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  add_header Strict-Transport-Security "max-age=31536000" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:" always;
  add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), microphone=(), payment=(), usb=()" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;
  proxy_connect_timeout 10s;
  proxy_read_timeout 60s;

  location /api/ {
    proxy_pass http://api;
  }

  location /auth/ {
    proxy_pass http://api;
  }

  location = /health {
    proxy_pass http://api/health;
  }

  location = /ready {
    proxy_pass http://api/ready;
  }

  location / {
    proxy_pass http://web;
  }
}
