[build]
  base = "apps/web"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# The build writes dist/_redirects. When NETLIFY_BACKEND_ORIGIN is configured,
# API and Feishu OAuth requests are proxied to the separately hosted FastAPI
# service before the final React SPA fallback rule.

[[headers]]
  for = "/*"
  [headers.values]
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
